<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quantity.css">
</head>

<style>

    body{
        background-color: #C5C1C0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 18px;
    }

    input{
        display: flex;
        flex-direction: row;

        padding: 10px;
        border-radius: 6px;
        border: none;
        
        margin-left: 10px;

        width: 95%;
        box-sizing: content-box;
    }

    button{
        color: #FFFFFF;
        background-color: #007AFF;

        padding: 15px 445px;
        margin-top: -20px;

        border-radius: 6px;
        border: none;

        box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2);

        cursor: pointer;
    }

    input:focus{
        outline: none;
        box-shadow: 0 0 10px #AAAAAA;
    }

    button:focus{
        text-decoration: none;
    }

</style>
<body>

<div class="container">

    <div class="imagem-refeicoes">

        <object data="../assets/home.jpg" type="image/jpg" ></object>

    </div>

    <div class="titulo-menu">
        Menu - Faça A Sua Escolha
    </div>

    <div class="conts-ints">

        <div class="cont-pratos">

            <div class="prato-titulo">
                <div class="txt-principal">Prato Principal</div>
                <div class="txt-subtitulo">Todos os pratos acompanham arroz, feijão e a sobremesa do dia.</div>
            </div>
            
            <div class="colunas-pratos">  
    
                <div class="prato">
    
                    <div class="imagem-prato">
                        <object data="../assets/bife.jpg" type="image/jpg"></object>
                    </div>
                    
                    <div class="prato-nome">
                        Bife com Batata
                    </div>
                    <div class="prato-preco">
                        R$ 30,00
                    </div>

                    <div class="contadores">

                        <div class="quantity buttons_added">
                            <input type="button" value="-" class="minus">
                            <input type="number" step="1" min="0" max="" id="bife" name="quantity" value="0" title="Qty"
                                class="input-text qty text" size="4" pattern="" inputmode="">
                            <input type="button" value="+" class="plus">
                        </div>

                    </div>

                </div>
            
                <div class="prato">
    
                    <div class="imagem-prato">
                        <object data="/assets/coxa.jpg" type="image/jpg"></object>
                    </div>
    
                    <div class="prato-nome">
                        Coxa de Frango Crocante
                    </div>
                    <div class="prato-preco">
                        R$ 25,00
                    </div>

                    <div class="contadores">

                        <div class="quantity buttons_added">
                            <input type="button" value="-" class="minus">
                            <input type="number" step="1" min="0" max="" id="coxa" name="quantity" value="0" title="Qty"
                                class="input-text qty text" size="4" pattern="" inputmode="">
                            <input type="button" value="+" class="plus">
                        </div>

                    </div>

                </div>
            
                <div class="prato">
    
                    <div class="imagem-prato">
                        <object data="/assets/panela.jpg" type="image/jpg"></object>
                    </div>
    
                    <div class="prato-nome">
                        Carne de Panela
                    </div>
                    <div class="prato-preco">
                        R$ 22,00
                    </div>

                    <div class="contadores">

                        <div class="quantity buttons_added">
                            <input type="button" value="-" class="minus">
                            <input type="number" step="1" min="0" max="" id="panela" name="quantity" value="0" title="Qty"
                                class="input-text qty text" size="4" pattern="" inputmode="">
                            <input type="button" value="+" class="plus">
                        </div>

                    </div>

                </div>
    
            </div>
            
        </div>
    
        <div class="cont-pratos">
    
            <div class="prato-titulo">
                <div class="txt-principal">Acompanhamentos</div>
                <div class="txt-subtitulo">Porções para uma pessoa</div>
            </div>
    
            <div class="colunas-pratos">
    
                <div class="prato">
    
                    <div class="imagem-prato">
                        <object data="/assets/farofa.jpg" type="image/jpg"></object>
                    </div>
    
                    <div class="prato-nome">
                        Farofa
                    </div>
                    <div class="prato-preco">
                        R$ 10,00
                    </div>

                    <div class="contadores">

                        <div class="quantity buttons_added">
                            <input type="button" value="-" class="minus">
                            <input type="number" step="1" min="0" max="" id="farofa" name="quantity" value="0" title="Qty"
                                class="input-text qty text" size="4" pattern="" inputmode="">
                            <input type="button" value="+" class="plus">
                        </div>

                    </div>

                </div>
        
                <div class="prato">
    
                    <div class="imagem-prato">
                        <object data="/assets/salad.jpg" type="image/jpg"></object>
                    </div>
    
                    <div class="prato-nome">
                        Salada
                    </div> 
                    <div class="prato-preco">
                        R$ 8,00
                    </div>

                    <div class="contadores">

                        <div class="quantity buttons_added">
                            <input type="button" value="-" class="minus">
                            <input type="number" step="1" min="0" max="" id="salada" name="quantity" value="0" title="Qty"
                                class="input-text qty text" size="4" pattern="" inputmode="">
                            <input type="button" value="+" class="plus">
                        </div>

                    </div>

                </div>
        
                <div class="prato">
    
                    <div class="imagem-prato">
                        <object data="/assets/torresmo.jpg" type="image/jpg"></object>
                    </div>
    
                    <div class="prato-nome">
                        Torresmo
                    </div>
                    <div class="prato-preco">
                        R$ 12,00
                    </div>

                    <div class="contadores">

                        <div class="quantity buttons_added">
                            <input type="button" value="-" class="minus">
                            <input type="number" step="1" min="0" max="" id="torresmo" name="quantity" value="0" title="Qty"
                                class="input-text qty text" size="4" pattern="" inputmode="">
                            <input type="button" value="+" class="plus">
                        </div>

                    </div>

                </div>
    
            </div>
            
        </div>
    
        <div class="cont-dados">
    
            <div class="dados-pessoais">
                <div class="txt-principal">Dados Pessoais</div>
            </div>
    
            <div class="inputs-dados">
    
                <input id="nome" type="text" placeholder="Nome:"></input>
    
                <input id="phone" type="text" placeholder="Digite o seu telefone"></input>
    
                <input id="email" type="text" placeholder="Email:"></input>
    

            </div>
            
        </div>
    
        <div class="btncalc">
            <button onclick="calc()">Calcular</button>
        </div>

    </div>
    
    
    <div class="pedidos">

        <div  id="nome-cliente" class="nome-cliente">
            
        </div>

        <div id="frase-pedido" class="frase-pedido">
            
        </div>

        <div class="frase-pedido">
           

            <div id="itens-pedidos" class="itens-pedidos">


            </div>

            <div id="preco-final" class="preco-final">


            </div>

        </div>

    </div>

</div>

<script src="js/jquery-3.6.0.min.js"></script>
<script src="js/jquery.mask.min.js"></script>
<script src="js/javascript.js"></script>
<script src="js/quantity.js"></script>
<script>
    $("#phone").mask("(99) 99999-9999");
</script>

</body>
</html>
